ServerRoot "/usr/local/apache2"
Listen 80
ServerName localhost

# Module
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule env_module modules/mod_env.so
LoadModule headers_module modules/mod_headers.so
LoadModule setenvif_module modules/mod_setenvif.so
LoadModule mime_module modules/mod_mime.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule unixd_module modules/mod_unixd.so

# User/Group
User daemon
Group daemon

# ─── Log-Format ──────────────────────────────────────────────────────────────
# Combined (AWStats + GoAccess Standard)
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
# Erweitert: mit Request-Zeit und Protokoll (für tiefere Analyse)
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D %{X-Forwarded-For}i" extended
# NCSA Common
LogFormat "%h %l %u %t \"%r\" %>s %b" common

# Haupt-Accesslog im combined Format (AWStats + GoAccess lesen das nativ)
CustomLog /usr/local/apache2/logs/access.log combined
ErrorLog  /usr/local/apache2/logs/error.log
LogLevel  warn

# ─── Basis-Konfiguration ─────────────────────────────────────────────────────
ServerTokens Prod
ServerSignature Off
KeepAlive On

<Directory />
    AllowOverride None
    Require all denied
</Directory>

DocumentRoot "/usr/local/apache2/htdocs"

<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html
</Directory>

# ─── robots.txt inline ───────────────────────────────────────────────────────
# KI-Bots sollen diesen Abruf im Log hinterlassen
Alias /robots.txt /usr/local/apache2/htdocs/robots.txt

# ─── Geschützter Bereich: testet ob Bots Disallow respektieren ───────────────
<Directory "/usr/local/apache2/htdocs/private">
    Require all denied
</Directory>

# ─── MIME-Typen ──────────────────────────────────────────────────────────────
TypesConfig /usr/local/apache2/conf/mime.types
AddType text/html .html
AddType text/plain .txt
AddType application/xml .xml
