# AWStats Konfiguration für bot-lab (Apache)

LogFile="/var/log/apache2/access.log"
LogType=W
# LogFormat=1 = Apache Combined Log Format (Standard)
LogFormat=1
SiteDomain="localhost"
HostAliases="localhost 127.0.0.1"

DirData="/var/lib/awstats"
DirIcons="/awstats/icon"

# ─── Bot/Crawler-Erkennung ───────────────────────────────────────────────────
NotPageList="css js class gif jpg jpeg png bmp ico rss xml swf"
ShowRobotsStats=HBL

# ─── Statistik-Optionen ──────────────────────────────────────────────────────
ShowSummary=HBL
ShowMonthStats=HBL
ShowDaysOfMonthStats=HBL
ShowDaysOfWeekStats=HBL
ShowHoursStats=HBL
ShowDomainsStats=HBL
ShowHostsStats=PHBL
ShowAuthenticatedUsers=0
ShowWormsStats=0
ShowEMailSenders=0
ShowEMailReceivers=0
ShowSessionsStats=1
ShowPagesStats=PBHL
ShowFileTypesStats=HB
ShowFileSizesStats=0
ShowDownloadsStats=HB
ShowOSStats=1
ShowBrowsersStats=1
ShowScreenSizeStats=0
ShowOriginStats=PH
ShowKeyphrasesStats=1
ShowKeywordsStats=1
ShowMiscStats=a
ShowHTTPErrorsStats=1
ShowSMTPErrorsStats=0

Lang="de"
