<VirtualHost *:80>
    ServerName localhost

    # Apache-eigene Logs in separates Verzeichnis (nicht in das Volume des Webservers)
    ErrorLog /var/log/awstats-apache/error.log
    CustomLog /var/log/awstats-apache/access.log combined

    DocumentRoot /var/www/html

    # AWStats CGI
    ScriptAlias /awstats/ /usr/lib/cgi-bin/
    <Directory "/usr/lib/cgi-bin/">
        Options +ExecCGI
        AddHandler cgi-script .pl
        Require all granted
    </Directory>

    # Statische AWStats-Assets
    Alias /awstats-icon/ /usr/share/awstats/icon/
    <Directory "/usr/share/awstats/icon/">
        Options None
        Require all granted
    </Directory>

    # Root → direkt zur AWStats-Auswertung
    RedirectMatch ^/$ /awstats/awstats.pl?config=bot-lab
</VirtualHost>
