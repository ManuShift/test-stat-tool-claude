services:

  # ─── Apache: der zu analysierende Webserver ──────────────────────────────
  apache:
    image: httpd:2.4-alpine
    container_name: bot-lab-apache
    ports:
      - "18080:80"
    volumes:
      - ./apache/conf/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/html:/usr/local/apache2/htdocs:ro
      - logs:/usr/local/apache2/logs
    networks:
      - bot-net

  # ─── GoAccess: Realtime Log-Dashboard ────────────────────────────────────
  goaccess:
    image: allinurl/goaccess:latest
    container_name: bot-lab-goaccess
    ports:
      - "17890:7890"
    volumes:
      - logs:/var/log/apache2:ro
      - ./goaccess/goaccess.conf:/etc/goaccess/goaccess.conf:ro
      - goaccess-report:/srv/report
    command: >
      /var/log/apache2/access.log
      --config-file=/etc/goaccess/goaccess.conf
      --output=/srv/report/index.html
      --real-time-html
      --ws-url=ws://localhost:17890
      --port=7890
      --addr=0.0.0.0
    depends_on:
      - apache
    networks:
      - bot-net

  goaccess-ui:
    image: nginx:alpine
    container_name: bot-lab-goaccess-ui
    ports:
      - "18888:80"
    volumes:
      - goaccess-report:/usr/share/nginx/html:ro
    depends_on:
      - goaccess
    networks:
      - bot-net

  # ─── AWStats ─────────────────────────────────────────────────────────────
  awstats:
    build:
      context: ./awstats
      dockerfile: Dockerfile
    container_name: bot-lab-awstats
    ports:
      - "18081:80"
    volumes:
      - logs:/var/log/apache2:ro
      - ./awstats/conf/awstats.bot-lab.conf:/etc/awstats/awstats.bot-lab.conf
      - ./awstats/lib:/awstats-lib
      - ./awstats/data:/var/lib/awstats
    depends_on:
      - apache
    networks:
      - bot-net

  # ─── Matomo: MariaDB ─────────────────────────────────────────────────────
  matomo-db:
    image: mariadb:10.11
    container_name: bot-lab-matomo-db
    environment:
      MYSQL_ROOT_PASSWORD: matomo_root
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: matomo_pass
    volumes:
      - matomo-db:/var/lib/mysql
    networks:
      - bot-net

  # ─── Matomo: Web-App ─────────────────────────────────────────────────────
  matomo:
    build:
      context: ./matomo
      dockerfile: Dockerfile
    container_name: bot-lab-matomo
    ports:
      - "18083:80"    # Matomo Web-UI  →  http://localhost:18083
    volumes:
      - matomo-data:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo_pass
      MATOMO_DATABASE_DBNAME: matomo
    depends_on:
      - matomo-db
    networks:
      - bot-net

  # ─── Matomo Log Importer: importiert Apache-Log periodisch ───────────────
  matomo-log-importer:
    image: python:3.12-slim
    container_name: bot-lab-matomo-importer
    volumes:
      - logs:/var/log/apache2:ro
      - matomo-data:/var/www/html:ro   # Zugriff auf import_logs.py
      - ./matomo/importer.sh:/importer.sh:ro
    entrypoint: ["bash", "/importer.sh"]
    environment:
      - MATOMO_URL=http://matomo:80
      - MATOMO_SITE_ID=1
      # Token wird nach Matomo-Setup eingetragen (siehe README)
      - MATOMO_TOKEN=efacdfc38b47d0ab1f76fed64c76788d
    depends_on:
      - matomo
    networks:
      - bot-net

  # ─── Log-Generator ───────────────────────────────────────────────────────
  log-generator:
    build:
      context: ./scripts
      dockerfile: Dockerfile.generator
    container_name: bot-lab-generator
    depends_on:
      - apache
    environment:
      - TARGET_HOST=apache
      - TARGET_PORT=80
    networks:
      - bot-net

  # ─── Python-Analyzer ─────────────────────────────────────────────────────
  analyzer:
    build:
      context: ./scripts
      dockerfile: Dockerfile.analyzer
    container_name: bot-lab-analyzer
    ports:
      - "18082:5000"
    volumes:
      - logs:/logs:ro
      - ./scripts/output:/output
    environment:
      - LOG_FILE=/logs/access.log
    networks:
      - bot-net

volumes:
  logs:
  goaccess-report:
  matomo-db:
  matomo-data:

networks:
  bot-net:
    driver: bridge
